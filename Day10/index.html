<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Register Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <form id="registerForm">

        <h2>Đăng ký</h2>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Nhập username">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" id="email" placeholder="Nhập email">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Nhập password">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại password">
            <small class="error"></small>
        </div>

        <button type="submit">Đăng ký</button>

    </form>
</div>
    <script src="riboo.js"></script>

    <script>

        // Rule cho form tren

        Validator({
            form: '#registerForm',
            rules: [
                Validator.isRequired('#username'),
                Validator.isEmail('#email'),
                Validator.minLength('#password', 6),
                Validator.isConfirm('#confirmPassword', function(){
                    return document.querySelector('#password').value;
                })
            ]
        })

    </script>
</body>
</html>
