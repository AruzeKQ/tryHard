<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Danh Sách Thành Viên Skibidi!!!!</h1>
    <ul id="members-list"></ul>
    <div>
        <label>Tên: </label>
        <input type="text" name="name">
    </div>
    <div>
        <label>Tuổi: </label>
        <input type="text" name="age">
    </div>
    <div>
        <label>Role: </label>
        <input type="text" name="role">
    </div>
    <div>
        <button id="create">Thêm</button>
    </div>

    <div id="edit-form" style="display:none;">
        <h3>Sửa thành viên</h3>
        <input type="text" name="edit-name" placeholder="Name">
        <input type="text" name="edit-age" placeholder="Age">
        <input type="text" name="edit-role" placeholder="Role">
        <button id="update-member">Cập nhật</button>
    </div>



    <script src="riboo.js"></script>
</body>
</html>
